<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Login</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(to right, #ef8c8c, #82b7f7);
      }

      .container {
        width: 1000px;
        height: 600px;
        display: flex;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }

      /* LEFT SIDE */

      .left-panel {
        width: 50%;
        background: #1f2d34;
        padding: 70px 60px;
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .left-panel h1 {
        color: #ff8b8b;
        font-size: 48px;
        margin-bottom: 10px;
      }

      .left-panel p {
        color: #cfcfcf;
        margin-bottom: 40px;
        font-size: 18px;
      }

      .input-box {
        width: 100%;
        height: 60px;
        border: 2px solid #5e7b87;
        border-radius: 50px;
        display: flex;
        align-items: center;
        padding: 0 20px;
        margin-bottom: 25px;
      }

      .input-box i {
        color: #ff8b8b;
        font-size: 22px;
        margin-right: 15px;
      }

      .input-box input {
        background: transparent;
        border: none;
        outline: none;
        color: white;
        width: 100%;
        font-size: 16px;
      }

      .input-box input::placeholder {
        color: #b9b9b9;
      }

      .login-btn {
        margin-top: 20px;
        width: 100%;
        height: 60px;
        border: none;
        border-radius: 50px;
        background: linear-gradient(to right, #ff8b8b, #9fdcff);
        color: white;
        font-size: 20px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
      }

      .login-btn:hover {
        transform: scale(1.03);
      }

      .forgot {
        margin-top: 20px;
        text-align: right;
      }

      .forgot a {
        color: #cfcfcf;
        text-decoration: none;
        font-size: 14px;
      }

      /* RIGHT SIDE */

      .right-panel {
        width: 50%;
        background:
          linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)),
          url("https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop");
        background-size: cover;
        background-position: center;
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 40px;
        text-align: center;
      }

      .right-panel h1 {
        color: #ff8b8b;
        font-size: 48px;
        margin-bottom: 15px;
      }

      .right-panel p {
        margin-bottom: 40px;
        font-size: 18px;
      }

      .social-icons {
        display: flex;
        gap: 25px;
        margin-bottom: 40px;
      }

      .social-icons div {
        width: 70px;
        height: 70px;
        border: 2px solid #ff8b8b;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: 0.3s;
        font-size: 28px;
      }

      .social-icons div:hover {
        background: #ff8b8b;
        transform: translateY(-5px);
      }

      .terms {
        margin-top: 20px;
        font-size: 14px;
        color: #ddd;
      }

      .terms span {
        color: #ff8b8b;
      }

      .create {
        margin-top: 50px;
      }

      .create a {
        color: white;
        text-decoration: none;
        font-size: 15px;
      }

      /* RESPONSIVE */

      @media (max-width: 900px) {
        .container {
          flex-direction: column;
          width: 95%;
          height: auto;
        }

        .left-panel,
        .right-panel {
          width: 100%;
        }

        .left-panel {
          padding: 50px 30px;
        }

        .right-panel {
          padding: 70px 20px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- LEFT -->

      <div class="left-panel">
        <h1>Member Login</h1>
        <p>Please fill in your basic info</p>

        <div class="input-box">
          <i class="bi bi-person-circle"></i>
          <input type="text" placeholder="Username" />
        </div>

        <div class="input-box">
          <i class="bi bi-lock"></i>
          <input type="password" placeholder="Password" />
        </div>

        <button class="login-btn">LOGIN</button>

        <div class="forgot">
          <a href="#">Forgot Password?</a>
        </div>
      </div>

      <!-- RIGHT -->

      <div class="right-panel">
        <h1>Sign Up</h1>
        <p>Using your social media account</p>

        <div class="social-icons">
          <div>
            <i class="bi bi-google"></i>
          </div>

          <div>
            <i class="bi bi-facebook"></i>
          </div>

          <div>
            <i class="bi bi-twitter-x"></i>
          </div>
        </div>

        <div class="terms">
          <input type="checkbox" />
          By signing up I agree with
          <span>terms and conditions</span>
        </div>

        <div class="create">
          <a href="#">Create account</a>
        </div>
      </div>
    </div>
  </body>
</html>
